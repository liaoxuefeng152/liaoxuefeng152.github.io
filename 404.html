<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到 | 拉克力跨境</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--bg-primary:#0A0E27;--bg-card:rgba(15,21,53,0.6);--border:rgba(99,102,241,0.15);--border-glow:rgba(99,102,241,0.4);--accent-1:#6366F1;--accent-2:#8B5CF6;--accent-3:#06B6D4;--text-primary:#F1F5F9;--text-secondary:#94A3B8;--text-muted:#64748B;--radius-sm:8px;--radius-md:12px;--radius-xl:24px;--transition:0.3s cubic-bezier(0.4,0,0.2,1)}
        body{font-family:'Inter','Noto Sans SC',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased;overflow:hidden;position:relative}
        #particleCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
        .grid-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(99,102,241,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 60% at 50% 50%,black 30%,transparent 70%);-webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 50%,black 30%,transparent 70%)}
        .glow-orb{position:fixed;border-radius:50%;filter:blur(120px);opacity:0.12;pointer-events:none;z-index:0;animation:orbFloat 20s ease-in-out infinite}
        .glow-orb.orb-1{width:500px;height:500px;background:var(--accent-1);top:-150px;right:-80px}
        .glow-orb.orb-2{width:400px;height:400px;background:var(--accent-2);bottom:-150px;left:-80px;animation-delay:-7s}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(40px,-20px) scale(1.1)}50%{transform:translate(-15px,30px) scale(0.9)}75%{transform:translate(-30px,-15px) scale(1.05)}}
        a{text-decoration:none}
        .error-wrap{max-width:520px;position:relative;z-index:2}
        .terminal-header{display:flex;gap:8px;margin-bottom:32px;justify-content:center}
        .terminal-dot{width:12px;height:12px;border-radius:50%}
        .terminal-dot.red{background:#FF5F56}.terminal-dot.yellow{background:#FFBD2E}.terminal-dot.green{background:#27C93F}
        .error-code{font-family:'JetBrains Mono',monospace;font-size:140px;font-weight:900;line-height:1;letter-spacing:-6px;margin-bottom:8px;background:linear-gradient(135deg,var(--accent-1),var(--accent-2),var(--accent-3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .error-code span{display:inline-block;animation:glitch 3s ease-in-out infinite}
        @keyframes glitch{0%,92%,100%{transform:translate(0)}93%{transform:translate(-3px,2px)}94%{transform:translate(3px,-1px)}95%{transform:translate(-2px,-2px)}96%{transform:translate(2px,2px)}97%{transform:translate(-1px,1px)}}
        .error-term{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-muted);margin-bottom:24px;line-height:2}
        .error-term .prompt{color:var(--accent-3)}.error-term .err{color:var(--accent-1)}.error-term .cursor{display:inline-block;width:8px;height:16px;background:var(--accent-3);animation:cursorBlink 1s step-end infinite;vertical-align:text-bottom}
        @keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}
        .error-wrap h1{font-size:28px;font-weight:800;margin-bottom:12px}
        .error-wrap p{font-size:16px;color:var(--text-secondary);margin-bottom:36px;line-height:1.7}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:100px;font-size:15px;font-weight:600;transition:var(--transition);position:relative;overflow:hidden}
        .btn::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transition:left 0.5s}
        .btn:hover::after{left:100%}
        .btn-primary{background:linear-gradient(135deg,var(--accent-1),var(--accent-2));color:white;box-shadow:0 0 30px rgba(99,102,241,0.3)}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(99,102,241,0.5)}
        .btn-outline{border:1px solid var(--border-glow);background:transparent;color:white;margin-left:12px}
        .btn-outline:hover{border-color:var(--accent-1);box-shadow:0 0 20px rgba(99,102,241,0.2);transform:translateY(-2px)}
        @media(max-width:480px){.error-code{font-size:100px}.btn{display:flex;margin:0 auto 12px}.btn-outline{margin-left:0}}
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="grid-bg"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="error-wrap">
        <div class="terminal-header"><div class="terminal-dot red"></div><div class="terminal-dot yellow"></div><div class="terminal-dot green"></div></div>
        <div class="error-term">
            <span class="prompt">lakeli ~ $</span> curl -I https://lakeli.top/this-page<br>
            HTTP/1.1 <span class="err">404 Not Found</span><br>
            <span class="prompt">lakeli ~ $</span> <span class="cursor"></span>
        </div>
        <div class="error-code">4<span>0</span>4</div>
        <h1>页面未找到</h1>
        <p>您访问的页面可能已被移动、删除或不存在。<br>请检查网址是否正确，或返回首页。</p>
        <div><a href="index.html" class="btn btn-primary">🏠 返回首页</a><a href="contact.html" class="btn btn-outline">📞 联系我们</a></div>
    </div>

    <script>
        const canvas=document.getElementById('particleCanvas'),ctx=canvas.getContext('2d');
        let ps=[],mouse={x:-1000,y:-1000};
        function rsz(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}rsz();window.addEventListener('resize',rsz);
        document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});
        class P{constructor(){this.reset()}reset(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.s=Math.random()*2+0.5;this.sx=(Math.random()-0.5)*0.5;this.sy=(Math.random()-0.5)*0.5;this.o=Math.random()*0.5+0.2;this.h=Math.random()<0.5?240+Math.random()*20:180+Math.random()*20}u(){const dx=mouse.x-this.x,dy=mouse.y-this.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<150){const f=(150-dist)/150;this.x-=dx*f*0.02;this.y-=dy*f*0.02}this.x+=this.sx;this.y+=this.sy;if(this.x<0)this.x=canvas.width;if(this.x>canvas.width)this.x=0;if(this.y<0)this.y=canvas.height;if(this.y>canvas.height)this.y=0}d(){ctx.beginPath();ctx.arc(this.x,this.y,this.s,0,Math.PI*2);ctx.fillStyle=`hsla(${this.h},80%,65%,${this.o})`;ctx.fill();ctx.beginPath();ctx.arc(this.x,this.y,this.s*2,0,Math.PI*2);ctx.fillStyle=`hsla(${this.h},80%,65%,${this.o*0.15})`;ctx.fill()}}
        for(let i=0;i<Math.min(50,Math.floor(window.innerWidth/20));i++)ps.push(new P());
        function dc(){for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++){const dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<120){const o=(120-dist)/120*0.08;ctx.beginPath();ctx.moveTo(ps[i].x,ps[i].y);ctx.lineTo(ps[j].x,ps[j].y);ctx.strokeStyle=`rgba(99,102,241,${o})`;ctx.lineWidth=0.5;ctx.stroke()}}}
        function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);ps.forEach(p=>{p.u();p.d()});dc();requestAnimationFrame(anim)}anim();
    </script>
    <script src="chat-widget.js"></script>
</body>
</html>
